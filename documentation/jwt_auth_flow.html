<div id="seq4"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    actorBkg: dark ? '#3C3489' : '#EEEDFE',
    actorBorder: dark ? '#AFA9EC' : '#534AB7',
    actorTextColor: dark ? '#EEEDFE' : '#26215C',
    signalColor: dark ? '#9c9a92' : '#73726c',
    signalTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    noteBkgColor: dark ? '#085041' : '#E1F5EE',
    noteBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    noteTextColor: dark ? '#E1F5EE' : '#04342C',
  },
});
const { svg } = await mermaid.render('seq4-svg', `sequenceDiagram
  participant U as User app
  participant B as Backend API
  participant DB as Database
  U->>B: POST /login (credentials)
  B->>DB: Verify user (hashed password)
  DB-->>B: User record
  B->>B: Generate JWT access + refresh token
  B-->>U: Return tokens
  U->>B: GET /profile (Authorization: Bearer token)
  B->>B: Validate token signature + expiry
  B-->>U: Protected data
  Note over U,B: Token expired
  U->>B: POST /refresh-token
  B->>B: Validate refresh token
  B-->>U: New access token
`);
document.getElementById('seq4').innerHTML = svg;
</script>
