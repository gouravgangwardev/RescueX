<div id="seq3"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    actorBkg: dark ? '#633806' : '#FAEEDA',
    actorBorder: dark ? '#EF9F27' : '#854F0B',
    actorTextColor: dark ? '#FAEEDA' : '#412402',
    signalColor: dark ? '#9c9a92' : '#73726c',
    signalTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    noteBkgColor: dark ? '#085041' : '#E1F5EE',
    noteBorderColor: dark ? '#5DCAA5' : '#0F6E56',
    noteTextColor: dark ? '#E1F5EE' : '#04342C',
  },
});
const { svg } = await mermaid.render('seq3-svg', `sequenceDiagram
  participant Do as Donor
  participant B as Backend API
  participant PG as Payment gateway
  participant DB as Database
  Do->>B: POST /donation/money/create (amount, purpose)
  B->>PG: Create order
  PG-->>B: order_id
  B-->>Do: Open checkout (order_id)
  Do->>PG: Complete payment (UPI/card/netbanking)
  PG-->>B: Webhook: payment success
  B->>B: POST /donation/money/verify
  B->>DB: Save transaction (status: success)
  B->>B: Generate receipt
  B-->>Do: Receipt + confirmation
  B->>DB: Update fund-status totals
`);
document.getElementById('seq3').innerHTML = svg;
</script>
